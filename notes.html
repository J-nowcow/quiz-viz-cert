const SUBJECTS = [
  "# 필기 과목1: 경영정보 일반\n\n> - **출제 문항**: 20문항 (전체 60문항 중 1/3)\n> - **시험 시간**: 60분 (3과목 통합)\n> - **합격 기준**: 과목당 40점 이상 + 평균 60점 이상\n> - **출제 범위**: 경영 기초, 기업 내부정보 파악, 기업 외부정보 활용\n\n← 경영정보시각화 MOC로 돌아가기\n\n---\n\n## 1. 출제 구조\n\n| 영역 | 세부 주제 | 비중 |\n|------|-----------|------|\n| **경영정보 이해** | 경영 개념, 데이터·정보·지식·통찰, 경영정보시스템, 환경분석, 전략수립 | ★★★ |\n| **기업 내부정보 파악** | 회계·재무, 인적자원, 마케팅·영업, 공급관리(SCM) | ★★★ |\n| **기업 외부정보 활용** | 공공데이터 포털, 국가통계포털, 기상자료, 공간정보 | ★★ |\n\n---\n\n## 2. 핵심 개념 정리\n\n### 2.1 경영정보의 기본 개념\n\n#### 데이터 → 정보 → 지식 → 통찰 (DIKW 피라미드)\n\n| 단계 | 정의 | 예시 |\n|------|------|------|\n| **데이터(Data)** | 가공되지 않은 사실, 수치 | 매출액: 1,000만원 |\n| **정보(Information)** | 맥락이 부여된 데이터 | 전월 대비 매출 20% 증가 |\n| **지식(Knowledge)** | 정보의 해석·경험 축적 | 시즌 효과로 매출 상승 패턴 |\n| **통찰(Insight)** | 지식 기반의 의사결정 판단 | 다음 시즌 재고를 30% 증량해야 함 |\n\n> DIKW 피라미드의 각 단계 정의와 차이점을 명확히 구분할 것. 정량적 데이터(Quantitative)와 정성적 데이터(Qualitative)의 차이도 빈출.\n\n#### 정량적 vs 정성적 데이터\n\n- **정량적 데이터(Quantitative Data)**: 수치로 측정 가능 (매출액, 고객 수, 생산량 등)\n- **정성적 데이터(Qualitative Data)**: 수치화 어렵고 주관적 (고객 만족도 서술, 브랜드 이미지 등)\n\n---\n\n### 2.2 경영정보시스템 (MIS, Management Information System)\n\n> 조직의 계획, 운영, 통제를 위한 정보를 수집·처리·저장·배포하는 시스템\n\n#### 경영정보시스템의 유형\n\n| 시스템 | 영문명 | 설명 | 주요 사용자 |\n|--------|--------|------|-------------|\n| **TPS** | Transaction Processing System | 일상적 거래 처리 (주문, 결제) | 운영직 |\n| **MIS** | Management Information System | 정기 보고서 생성, 현황 모니터링 | 중간관리자 |\n| **DSS** | Decision Support System | 비정형 의사결정 지원 | 중간~상위관리자 |\n| **EIS/ESS** | Executive Information/Support System | 경영진 전략적 의사결정 지원 | 최고경영자 |\n| **KMS** | Knowledge Management System | 지식 생성·공유·활용 관리 | 전사 |\n\n---\n\n### 2.3 의사결정지원시스템 (DSS, Decision Support System)\n\n- **목적**: 반구조적·비구조적 의사결정 문제 해결 지원\n- **구성요소**:\n  - **데이터 관리 서브시스템**: 내외부 데이터 수집·관리\n  - **모델 관리 서브시스템**: 통계·최적화·시뮬레이션 모델\n  - **사용자 인터페이스 서브시스템**: 사용자와 시스템 간 상호작용\n- **특징**: What-if 분석, 민감도 분석, 목표탐색 분석 등 지원\n\n> DSS의 3가지 구성요소, MIS와 DSS의 차이점(정형 vs 비정형 의사결정)이 빈출.\n\n---\n\n### 2.4 BI (Business Intelligence)\n\n> 기업 내외부 데이터를 수집·통합·분석하여 경영 의사결정에 필요한 정보를 제공하는 일련의 프로세스, 기술, 도구\n\n#### BI 구성요소\n\n```\n데이터 소스 → ETL → 데이터웨어하우스/마트 → OLAP/분석 → 리포팅/대시보드\n```\n\n| 구성요소 | 설명 |\n|----------|------|\n| **ETL** (Extract, Transform, Load) | 데이터 추출·변환·적재 프로세스 |\n| **데이터웨어하우스** (DW, Data Warehouse) | 의사결정을 위한 통합 데이터 저장소 |\n| **데이터마트** (Data Mart) | 특정 부서/주제 중심의 소규모 DW |\n| **OLAP** (Online Analytical Processing) | 다차원 데이터 분석 도구 |\n| **대시보드** (Dashboard) | 핵심 지표를 시각적으로 표현하는 인터페이스 |\n| **리포팅** (Reporting) | 정기/비정기 보고서 자동 생성 |\n\n---\n\n### 2.5 데이터웨어하우스 (DW)와 데이터마트 (Data Mart)\n\n#### 데이터웨어하우스 특성 (Bill Inmon 정의)\n\n| 특성 | 설명 |\n|------|------|\n| **주제지향적(Subject-Oriented)** | 특정 주제(고객, 제품 등) 중심으로 구성 |\n| **통합적(Integrated)** | 여러 소스의 데이터를 일관된 형식으로 통합 |\n| **시간변이적(Time-Variant)** | 일정 기간의 데이터를 보관하여 시계열 분석 가능 |\n| **비휘발적(Non-Volatile)** | 한번 저장된 데이터는 변경되지 않음 (읽기 전용) |\n\n#### DW vs Data Mart\n\n| 구분 | 데이터웨어하우스 | 데이터마트 |\n|------|------------------|------------|\n| 범위 | 전사적 | 부서/주제별 |\n| 데이터 크기 | 대규모 | 소규모 |\n| 구축 기간 | 장기 | 단기 |\n| 설계 방식 | Top-Down (Inmon) | Bottom-Up (Kimball) |\n\n---\n\n### 2.6 OLAP (Online Analytical Processing)\n\n> 다차원 데이터 모델을 기반으로 사용자가 대화식으로 데이터를 분석하는 기술\n\n#### OLAP 주요 연산\n\n| 연산 | 설명 | 예시 |\n|------|------|------|\n| **Roll-up (Drill-up)** | 상위 차원으로 집계 | 월별 → 분기별 매출 |\n| **Drill-down** | 하위 차원으로 상세화 | 연간 → 월별 → 일별 매출 |\n| **Slice** | 하나의 차원 값을 고정하여 단면 추출 | 2026년 1분기만 조회 |\n| **Dice** | 여러 차원 값을 선택하여 부분 큐브 생성 | 서울+부산, 1~2분기 데이터 |\n| **Pivot (Rotate)** | 축을 변경하여 다른 관점에서 분석 | 행/열 전환 |\n\n#### OLAP 유형\n\n- **MOLAP** (Multidimensional OLAP): 다차원 데이터베이스 사용, 빠른 조회 속도\n- **ROLAP** (Relational OLAP): 관계형 DB 사용, 대용량 데이터 처리에 유리\n- **HOLAP** (Hybrid OLAP): MOLAP + ROLAP 혼합\n\n> Roll-up/Drill-down, Slice/Dice 개념 구분이 빈출. OLTP(거래처리)와 OLAP(분석처리)의 차이도 중요.\n\n---\n\n### 2.7 ETL (Extract, Transform, Load)\n\n| 단계 | 설명 |\n|------|------|\n| **Extract (추출)** | 다양한 소스 시스템에서 데이터 수집 |\n| **Transform (변환)** | 데이터 정제, 형식 통일, 코드 매핑, 집계 |\n| **Load (적재)** | 변환된 데이터를 DW/DM에 저장 |\n\n- **ELT**: 클라우드 환경에서 적재 후 변환하는 방식 (최근 트렌드)\n\n---\n\n### 2.8 데이터 거버넌스 (Data Governance)\n\n> 데이터의 품질, 보안, 프라이버시, 활용을 관리하기 위한 조직적 정책·프로세스·표준 체계\n\n#### 핵심 구성요소\n\n- **데이터 품질 관리(Data Quality)**: 정확성, 완전성, 일관성, 적시성 보장\n- **데이터 표준 관리**: 용어, 코드, 도메인 표준 정의\n- **데이터 보안(Data Security)**: 접근 권한, 암호화, 개인정보 보호\n- **마스터 데이터 관리(MDM, Master Data Management)**: 핵심 데이터의 단일 진실 공급원 관리\n- **메타데이터 관리(Metadata Management)**: 데이터에 대한 데이터 관리\n\n---\n\n### 2.9 ERP, CRM, SCM — 기업 핵심 정보시스템\n\n#### ERP (Enterprise Resource Planning, 전사적 자원관리)\n\n- **목적**: 기업 내 모든 자원(인사, 재무, 생산, 물류 등)을 통합 관리\n- **특징**: 실시간 처리, 통합 데이터베이스, 모듈 구조, Best Practice 내장\n- **주요 모듈**: 재무(FI), 관리회계(CO), 생산(PP), 자재관리(MM), 영업(SD), 인사(HR)\n- **대표 솔루션**: SAP ERP, Oracle ERP Cloud\n\n#### CRM (Customer Relationship Management, 고객관계관리)\n\n- **목적**: 고객과의 관계를 체계적으로 관리하여 고객 가치 극대화\n- **유형**:\n  - **운영적 CRM(Operational)**: 영업, 마케팅, 서비스 자동화\n  - **분석적 CRM(Analytical)**: 고객 데이터 분석, 세그먼트, 이탈 예측\n  - **협업적 CRM(Collaborative)**: 다채널 고객 접점 통합\n- **핵심 개념**: 고객생애가치(CLV, Customer Lifetime Value), RFM 분석\n\n#### SCM (Supply Chain Management, 공급망관리)\n\n- **목적**: 원자재 조달 → 생산 → 유통 → 고객 전달까지 공급망 전체 최적화\n- **핵심 요소**: 수요예측, 재고관리, 물류관리, 공급자 관계 관리(SRM)\n- **관련 개념**: 불윕 효과(Bullwhip Effect), JIT(Just-In-Time), SCM vs SRM\n\n#### KM (Knowledge Management, 지식관리)\n\n- **목적**: 조직 내 지식의 생성·저장·공유·활용 체계화\n- **지식 유형**:\n  - **암묵지(Tacit Knowledge)**: 개인 경험에 내재된 지식\n  - **형식지(Explicit Knowledge)**: 문서화·체계화된 지식\n- **SECI 모델 (노나카 이쿠지로)**:\n  - 공통화(Socialization) → 표출화(Externalization) → 연결화(Combination) → 내면화(Internalization)\n\n> ERP/CRM/SCM/KM의 정의·목적 차이, CRM의 3가지 유형, SECI 모델 4단계가 빈출.\n\n---\n\n### 2.10 환경 분석 및 경영 전략\n\n#### 외부 환경 분석\n\n| 분석 도구 | 설명 |\n|-----------|------|\n| **PEST 분석** | Political(정치), Economic(경제), Social(사회), Technological(기술) 거시환경 분석 |\n| **5 Forces (Porter)** | 산업 경쟁 구조 분석 — 기존 경쟁자, 신규 진입자, 대체재, 공급자 교섭력, 구매자 교섭력 |\n| **3C 분석** | Company(자사), Customer(고객), Competitor(경쟁자) |\n\n#### 내부 환경 분석\n\n| 분석 도구 | 설명 |\n|-----------|------|\n| **가치사슬 분석(Value Chain)** | 본원활동(물류, 운영, 마케팅, 서비스) + 지원활동(인프라, HR, 기술개발, 조달) |\n| **핵심역량 분석(Core Competence)** | 경쟁 우위의 원천이 되는 핵심 능력 식별 |\n| **BCG 매트릭스** | 시장성장률 × 시장점유율로 사업 포트폴리오 분석 (Star, Cash Cow, Question Mark, Dog) |\n\n#### 전략 방향 분석\n\n| 분석 도구 | 설명 |\n|-----------|------|\n| **SWOT 분석** | Strengths(강점), Weaknesses(약점), Opportunities(기회), Threats(위협) |\n| **전략 유형** | SO전략(강점+기회), WO전략(약점+기회), ST전략(강점+위협), WT전략(약점+위협) |\n\n> SWOT 분석의 4가지 전략 유형 매칭, Porter의 5 Forces 5가지 요소, BCG 매트릭스의 4분면 명칭이 빈출.\n\n---\n\n### 2.11 회계·재무 기본 정보\n\n#### 재무제표 (Financial Statements)\n\n| 재무제표 | 내용 |\n|----------|------|\n| **재무상태표(B/S)** | 특정 시점의 자산, 부채, 자본 (자산 = 부채 + 자본) |\n| **손익계산서(I/S)** | 일정 기간의 수익과 비용 (매출 - 비용 = 이익) |\n| **현금흐름표(C/F)** | 영업·투자·재무 활동의 현금 흐름 |\n| **자본변동표** | 자본의 변동 내역 |\n| **주석** | 재무제표 보충 설명 |\n\n#### 주요 재무비율\n\n| 분류 | 비율 | 산식 |\n|------|------|------|\n| **안정성** | 부채비율 | 부채총계 / 자본총계 × 100 |\n| **안정성** | 유동비율 | 유동자산 / 유동부채 × 100 |\n| **수익성** | ROE (자기자본이익률) | 당기순이익 / 자기자본 × 100 |\n| **수익성** | ROA (총자산이익률) | 당기순이익 / 총자산 × 100 |\n| **수익성** | 매출총이익률 | 매출총이익 / 매출액 × 100 |\n| **활동성** | 총자산회전율 | 매출액 / 총자산 |\n| **활동성** | 재고자산회전율 | 매출원가 / 재고자산 |\n| **성장성** | 매출액증가율 | (당기매출 - 전기매출) / 전기매출 × 100 |\n\n> 재무제표의 종류와 구성 항목, 재무비율 산식(특히 부채비율, 유동비율, ROE)이 빈출. 재고자산 회계처리(선입선출법 FIFO, 후입선출법 LIFO, 이동평균법)도 출제.\n\n---\n\n### 2.12 인적자원 관리 (HRM)\n\n- **인력 계획**: 인력 수요예측, 공급예측\n- **채용**: 모집, 선발, 배치\n- **평가**: BSC(Balanced Scorecard), MBO(Management by Objectives), KPI\n- **보상**: 연봉제, 성과급, 스톡옵션\n- **개발**: 교육훈련, 경력개발(CDP)\n- **관련 용어**: 인적자본(Human Capital), 역량모델(Competency Model)\n\n---\n\n### 2.13 마케팅·영업 정보\n\n#### 핵심 마케팅 프레임워크\n\n| 개념 | 설명 |\n|------|------|\n| **STP** | Segmentation(시장세분화) → Targeting(목표시장 선정) → Positioning(포지셔닝) |\n| **4P (마케팅 믹스)** | Product(제품), Price(가격), Place(유통), Promotion(촉진) |\n| **4C** | Customer Value, Cost, Convenience, Communication |\n| **제품수명주기(PLC)** | 도입기 → 성장기 → 성숙기 → 쇠퇴기 |\n| **고객세분화** | 인구통계, 지리적, 심리적, 행동적 기준 |\n\n#### 영업 관련 정보\n\n- 매출 분석: 매출액, 매출원가, 매출총이익, 영업이익\n- 고객 분석: RFM (Recency, Frequency, Monetary)\n- 유통 채널: 직접판매, 간접판매, 온라인/오프라인\n\n---\n\n### 2.14 구매·조달 및 공급관리\n\n- **구매 프로세스**: 수요파악 → 공급자 선정 → 발주 → 입고·검수 → 대금지급\n- **재고관리**: 경제적 주문량(EOQ), 안전재고(Safety Stock), ABC 분석\n- **생산관리**: MRP(Material Requirements Planning), MRP II, JIT\n- **물류관리**: 3PL(제3자 물류), 4PL, 라스트마일 배송\n\n---\n\n### 2.15 빅데이터 (Big Data)\n\n#### 빅데이터 특성\n\n| 3V (기본) | 설명 |\n|-----------|------|\n| **Volume (규모)** | 대용량 데이터 |\n| **Velocity (속도)** | 실시간 생성·처리 속도 |\n| **Variety (다양성)** | 정형·반정형·비정형 데이터 |\n\n| 확장 (5V) | 설명 |\n|------------|------|\n| **Veracity (정확성)** | 데이터의 신뢰성·품질 |\n| **Value (가치)** | 데이터에서 추출할 수 있는 비즈니스 가치 |\n\n---\n\n### 2.16 데이터 마이닝 (Data Mining)\n\n> 대규모 데이터에서 의미 있는 패턴, 규칙, 관계를 자동적으로 발견하는 기법\n\n#### 주요 기법\n\n| 기법 | 설명 | 예시 |\n|------|------|------|\n| **분류(Classification)** | 사전 정의된 범주에 할당 | 고객 이탈 예측 |\n| **군집화(Clustering)** | 유사한 개체끼리 그룹핑 | 고객 세그먼트 분류 |\n| **연관규칙(Association Rule)** | 항목 간 연관성 발견 | 장바구니 분석 (맥주→기저귀) |\n| **회귀(Regression)** | 연속적 값 예측 | 매출액 예측 |\n| **시계열분석(Time Series)** | 시간에 따른 패턴 분석 | 주가 추세 분석 |\n\n---\n\n### 2.17 클라우드 컴퓨팅, IoT, AI 기초\n\n#### 클라우드 컴퓨팅 (Cloud Computing)\n\n| 서비스 모델 | 설명 | 예시 |\n|-------------|------|------|\n| **IaaS** (Infrastructure as a Service) | 서버, 스토리지, 네트워크 제공 | AWS EC2, Azure VM |\n| **PaaS** (Platform as a Service) | 개발 플랫폼 제공 | Google App Engine |\n| **SaaS** (Software as a Service) | 소프트웨어 서비스 제공 | Microsoft 365, Salesforce |\n\n- **배포 모델**: 퍼블릭(Public), 프라이빗(Private), 하이브리드(Hybrid), 커뮤니티(Community)\n\n#### IoT (Internet of Things, 사물인터넷)\n\n- **정의**: 사물에 센서와 통신 기능을 내장하여 인터넷에 연결하는 기술\n- **구성**: 센서/디바이스 → 네트워크 → 플랫폼 → 서비스/응용\n- **활용**: 스마트 공장, 스마트 홈, 스마트 시티\n\n#### AI (Artificial Intelligence, 인공지능)\n\n- **머신러닝(Machine Learning)**: 데이터로부터 패턴을 학습하는 알고리즘\n  - 지도학습(Supervised), 비지도학습(Unsupervised), 강화학습(Reinforcement)\n- **딥러닝(Deep Learning)**: 인공신경망 기반의 머신러닝 기법\n- **자연어처리(NLP)**: 텍스트/음성 데이터 처리·분석\n\n---\n\n### 2.18 기업 외부 정보 활용\n\n> 시험에서 자주 출제되는 공공정보 출처를 반드시 암기할 것\n\n| 포털 | URL | 주요 데이터 |\n|------|-----|-------------|\n| **공공데이터포털** | data.go.kr | 정부·공공기관 개방 데이터 |\n| **국가통계포털(KOSIS)** | kosis.kr | 인구, 경제, 사회 통계 |\n| **기상자료개방포털** | data.kma.go.kr | 기상·기후 데이터 |\n| **국가공간정보포털** | nsdi.go.kr | 지도·공간 데이터 |\n| **DART(전자공시)** | dart.fss.or.kr | 기업 재무 공시정보 |\n| **통계지리정보서비스(SGIS)** | sgis.kostat.go.kr | 통계 지도 서비스 |\n\n---\n\n## 3. 빈출 키워드 정리\n\n| 키워드 | 핵심 내용 | 빈출도 |\n|--------|-----------|--------|\n| DIKW 피라미드 | Data → Information → Knowledge → Wisdom(Insight) | ★★★ |\n| ERP | 전사적 자원관리, 통합 DB, 모듈 구조 | ★★★ |\n| CRM | 고객관계관리, 운영적/분석적/협업적 | ★★★ |\n| SCM | 공급망관리, 불윕효과, JIT | ★★★ |\n| SWOT 분석 | SO/WO/ST/WT 전략 매칭 | ★★★ |\n| Porter 5 Forces | 5가지 경쟁 세력 | ★★★ |\n| 재무제표 | B/S, I/S, C/F 구성과 관계 | ★★★ |\n| 재무비율 | 부채비율, 유동비율, ROE, ROA 산식 | ★★★ |\n| DW 특성 | 주제지향적, 통합적, 시간변이적, 비휘발적 | ★★★ |\n| OLAP 연산 | Roll-up, Drill-down, Slice, Dice, Pivot | ★★★ |\n| ETL | Extract, Transform, Load | ★★☆ |\n| BI | 데이터 기반 의사결정 지원 체계 | ★★☆ |\n| 빅데이터 3V/5V | Volume, Velocity, Variety + Veracity, Value | ★★☆ |\n| 데이터 마이닝 | 분류, 군집화, 연관규칙, 회귀 | ★★☆ |\n| STP / 4P | 마케팅 전략 프레임워크 | ★★☆ |\n| BCG 매트릭스 | Star, Cash Cow, Question Mark, Dog | ★★☆ |\n| 클라우드 | IaaS, PaaS, SaaS 구분 | ★★☆ |\n| KM / SECI 모델 | 암묵지↔형식지, 4단계 변환 | ★★☆ |\n| 공공데이터 포털 | data.go.kr, KOSIS, DART 등 | ★★☆ |\n| PLC | 도입기 → 성장기 → 성숙기 → 쇠퇴기 | ★☆☆ |\n| EOQ | 경제적 주문량 | ★☆☆ |\n| IoT / AI | 사물인터넷, 머신러닝 기초 | ★☆☆ |\n\n---\n\n## 4. 기출 포인트 — 자주 나오는 문제 유형\n\n> 아래는 모의문제 및 기출 분석을 기반으로 정리한 빈출 유형입니다.\n\n### 유형 1: 개념 정의·비교 (가장 빈출)\n- [ ] MIS vs DSS vs EIS 차이점\n- [ ] 데이터 vs 정보 vs 지식 구분\n- [ ] OLAP vs OLTP 차이\n- [ ] 데이터웨어하우스 vs 데이터마트 차이\n- [ ] 정량적 데이터 vs 정성적 데이터\n\n### 유형 2: 구성요소 나열\n- [ ] DSS의 3가지 구성요소\n- [ ] BI 시스템 구성 요소 (ETL → DW → OLAP → Dashboard)\n- [ ] DW의 4가지 특성 (주제지향, 통합, 시간변이, 비휘발)\n- [ ] Porter 5 Forces의 5가지 요소\n- [ ] 재무제표의 종류\n\n### 유형 3: 분석 도구 적용\n- [ ] SWOT 분석에서 SO/WO/ST/WT 전략 매칭\n- [ ] BCG 매트릭스 4분면에 사업부 배치\n- [ ] PEST 분석의 각 영역에 해당하는 요인 분류\n- [ ] 가치사슬 분석의 본원활동 vs 지원활동 구분\n\n### 유형 4: 산식·계산 문제\n- [ ] 재무비율 계산 (부채비율, 유동비율, ROE, ROA 등)\n- [ ] 매출총이익, 영업이익, 당기순이익 산출\n- [ ] 재고자산 평가 (FIFO, LIFO, 이동평균법)\n\n### 유형 5: 시스템·기술 매칭\n- [ ] ERP/CRM/SCM/KM 각각에 해당하는 기능·사례 매칭\n- [ ] IaaS/PaaS/SaaS에 해당하는 서비스 분류\n- [ ] OLAP 연산(Roll-up, Drill-down, Slice, Dice) 상황 매칭\n- [ ] 데이터 마이닝 기법과 활용 사례 매칭\n\n### 유형 6: 공공데이터·외부정보\n- [ ] 공공데이터 포털별 제공 데이터 종류 매칭\n- [ ] 국가통계포털(KOSIS)에서 제공하는 통계 분류\n- [ ] DART 전자공시시스템의 역할\n\n---\n\n## 5. 보강 영역 (퀴즈 출제 대비)\n\n### 5.1 경영의 4대 기능 및 전략 모델\n\n| 기능 | 설명 |\n|------|------|\n| **계획(Planning)** | 목표 설정 및 행동 방침 결정 |\n| **조직(Organizing)** | 자원 배분 및 구조 설계 |\n| **지휘(Leading)** | 구성원 동기부여 및 의사소통 |\n| **통제(Controlling)** | 성과 측정 및 시정 조치 |\n\n- **맥킨지 7S**: Strategy, Structure, System, Staff, Skill, Style, **Shared Value**\n- **수평적 통합**: 같은 산업·같은 생산 단계의 기업 간 통합 (예: 자동차 회사끼리 합병)\n- **수직적 통합**: 공급사슬의 상류/하류로 확장 (예: 제조사가 유통업체 인수)\n- **퍼플오션**: 레드오션(경쟁 치열) + 블루오션(경쟁 없음) 조합 전략\n- **BSC(Balanced Scorecard) 4관점**: 재무, 고객, 내부 프로세스, 학습/성장\n\n---\n\n### 5.2 디지털 마케팅 성과지표\n\n| 지표 | 명칭 | 산식/정의 |\n|------|------|----------|\n| **CPM** | Cost Per Mille | 총비용 / 노출수 × 1,000 |\n| **CPC** | Cost Per Click | 총비용 / 총클릭 수 |\n| **CPI** | Cost Per Install | 총비용 / 총설치 수 |\n| **CPA** | Cost Per Action | 총비용 / 총액션(전환) 수 |\n| **CTR** | Click Through Rate | (총클릭 수 / 총노출 수) × 100 |\n| **CVR** | Conversion Rate | (전환 수 / 총방문 수) × 100 (구매, 가입, 다운로드 포함) |\n| **ROAS** | Return On Ad Spend | 매출액 / 광고비 (광고 투자 대비 수익률) |\n| **ROI** | Return On Investment | (순이익 / 투자비용) × 100 |\n| **고착도(Stickiness)** | | DAU / MAU (지속 사용 정도) |\n\n- **자연검색량**: 특정 키워드의 검색 엔진 검색 빈도\n- **노출도(Impression)**: 광고가 사용자에게 보여진 횟수\n- **도달 범위(Reach)**: 광고에 노출된 고유 사용자 수\n- **빈도(Frequency)**: 1인당 평균 노출 횟수\n- **GRP**: Reach × Frequency\n- **광고의 이월효과**: 특정 시점 광고 효과가 이후 시점에서도 발현\n\n---\n\n### 5.3 마케팅·유통 심화\n\n#### 판매 전략\n\n| 전략 | 설명 |\n|------|------|\n| **상향판매(Up-selling)** | 더 고급/비싼 상품 판매 |\n| **교차판매(Cross-selling)** | 연관 상품 함께 판매 |\n| **번들판매** | 여러 상품 묶어서 판매 |\n\n#### 소비자 쇼핑 행동\n\n| 용어 | 설명 |\n|------|------|\n| **쇼루밍** | 오프라인 매장 → 온라인 구매 |\n| **모루밍** | 오프라인 매장에서 즉석 모바일 구매 |\n| **웹루밍** | 온라인 검색 → 오프라인 구매 |\n\n- **바이럴 마케팅**: 자발적 전파 (이메일, 블로그, SNS)\n- **버즈 마케팅**: 입소문 유도\n- **게릴라 마케팅**: 저비용 비전통적 방법\n- **브랜드 자산**: 상표를 가짐으로써 발생하는 마케팅 효과\n- **고객획득비용(CAC)**: 총 마케팅 비용 / **신규** 고객 수 (재구매 고객 아님)\n- **유보가격**: 소비자가 지불할 의사가 있는 최고 가격\n- **웨버의 법칙**: 가격 변화 감지 정도가 가격 수준에 따라 다름\n\n#### 유통 경로 전략\n\n| 전략 | 설명 |\n|------|------|\n| **개방적** | 가능한 많은 소매점에 유통 |\n| **선택적** | 일부 우수 소매점만 선정 |\n| **전속적** | 특정 지역에 독점 유통권 부여 |\n\n- **수직적 마케팅시스템(VMS)**: 기업형, **계약형**, 관리형\n- **유통 경로 갈등 원인**: 목표 불일치, 역할 불일치, **지각** 불일치\n- **크리스탈러 중심지이론**: 이상적 상권 = **육각형**\n\n---\n\n### 5.4 인적자원관리 심화\n\n#### 보상 제도\n\n| 구분 | 예시 |\n|------|------|\n| **법정 복리후생** | 4대 보험, 유급휴가, 퇴직금 |\n| **법정 외 복리후생** | EAP(종업원지원프로그램), 사내 식당, 통근버스 |\n\n#### 임금 조정 방식\n\n| 방식 | 설명 |\n|------|------|\n| **베이스업** | 물가상승 등에 따라 전 직원 일괄 인상 |\n| **승급** | 근무 연수에 따른 임금 인상 |\n| **승진** | 상위 직위로 이동 |\n| **승격** | 역할·책임 확장에 따른 임금 인상 |\n| **슬라이딩 스케일** | 물가지수 연동 자동 임금 조정 |\n\n#### 경력개발\n\n- **Hall의 경력단계**: 탐색 → **확립** → 유지 → 쇠퇴(통합)\n- **이중경력제도**: 관리직/전문직 두 트랙 경력 경로\n- **리스킬링**: 새로운 기술/역량 재학습\n- **전직지원제도**: 퇴직 예정자의 퇴직 후 경력개발 지원\n- **대용승진(건조승진)**: 직급 명칭만 변경, 실질적 보상 변동 없음\n\n#### 인사 평가 방법\n\n| 방법 | 설명 |\n|------|------|\n| **행동기준평가법(BARS)** | 평정척도법 + 중요사건기록법 혼합 |\n| **목표관리법(MBO)** | 목표 달성도 기준 평가 |\n| **360도 평가** | 상사/동료/부하/본인 다면 평가 |\n| **강제배분법** | 등급별 인원 비율 강제 할당 |\n\n- **기능식 조직**: 전문화 효율 높지만, 부서 간 조정 **어려움** (단점)\n\n---\n\n### 5.5 재무 심화\n\n#### 손익분기점(BEP)\n\n- 총수익 = 총비용인 시점\n- 고정비 ↑ → 손익분기점 ↑ (높아짐)\n- BEP = 고정비 / (단위당 판매가 - 단위당 변동비)\n\n#### 매출원가 계산\n\n```\n순매입액 = 매입가격 + 매입 부대 비용\n매출원가 = 기초상품재고액 + 순매입액 - 기말상품재고액\n```\n\n#### 감가상각 방법\n\n| 방법 | 특징 |\n|------|------|\n| **정액법** | 매년 동일 금액 상각 (간단, 직관적) |\n| **정률법** | 매년 일정 비율로 상각 (초기 비용 큼) |\n| **생산량비례법** | 실제 사용량에 비례 |\n| **연수합계법** | 내용연수 합계 기반 체감 상각 |\n\n#### 금융 파생상품\n\n| 상품 | 설명 |\n|------|------|\n| **옵션** | 일정 기간 내 특정 자산을 사거나 팔 **권리** (프리미엄 지불) |\n| **선물** | 미래 시점에 미리 정해진 가격으로 인수도 **의무** |\n| **스왑** | 현금흐름을 교환하는 계약 |\n\n- **채권 투자위험**: 채무불이행위험, 시장위험, 구매력감소위험 (자본예산위험은 아님)\n- **시장점유율** = 특정기업 연간매출 / 전체 시장규모\n\n---\n\n### 5.6 생산·품질·물류관리 심화\n\n#### 수요 변화 형태\n\n| 형태 | 설명 |\n|------|------|\n| **수평적 수요** | 일정한 평균 중심 상승/하강 반복 |\n| **추세적 수요** | 장기적 증가/감소 추세 |\n| **계절적 수요** | 특정 시기 반복 패턴 |\n| **순환적 수요** | 경기 순환에 따른 변동 |\n\n#### 수요예측 오류 지표\n\n| 지표 | 설명 |\n|------|------|\n| **MAD** | Mean Absolute Deviation (절대값 평균) |\n| **MSE** | Mean Squared Error (제곱 평균) |\n| **MAPE** | Mean Absolute Percent Error (백분율) |\n| **MFE** | Mean Forecast Error (편향 측정) |\n\n#### 생산관리\n\n- **EOQ(경제적 주문량)** 관련 요소: 주문비용, 유지비용, 연간 수요량 (노동시간은 아님)\n- **유효 생산 능력**: 정상 조건 하 경제적 최대 산출량\n- **설계 생산 능력**: 이론적 최대 산출량\n- 생산 능력 측정: 재화 → **산출 척도**, 서비스 → **투입 척도**\n- **로버스트 설계**: 노이즈에 둔감한 설계\n- **그룹 테크놀로지**: 유사 부품을 군으로 분류하여 생산\n\n#### 품질관리 도구\n\n| 도구 | 설명 |\n|------|------|\n| **파레토 분석** | 중요한 소수 vs 사소한 다수 (80/20 법칙) |\n| **관리도** | 품질 측정값을 시간 순서로 표시하는 도표 |\n| **품질분임조** | 품질 향상 위해 주기적 모임을 갖는 근로자 소집단 |\n| **싱고시스템** | 포카요케(실수 방지 장치)를 활용한 결함 예방 |\n| **ISO 9000** | 품질 프로그램 문서화 국제표준 |\n\n#### 물류·공급사슬\n\n- **채찍 효과**: 하류 소규모 수요변동 → 상류로 갈수록 변동폭 증가 (원인: 정보 부족)\n- **공급사슬의 3가지 이동**: 물리적 이동, 현금 흐름, 정보의 교환\n- **SCOR 모형**: 계획 → 조달 → **생산** → 배송 → 반품/회수\n- **크로스 도킹**: 입고 없이 물류센터에서 바로 재배송\n- **트래픽 관리**: 자재/제품의 입·출하 선적 관리\n\n---\n\n### 5.7 외부정보 심화\n\n| 플랫폼 | 설명 |\n|--------|------|\n| **E-지방지표** | KOSIS 내 지자체 생활환경·경영상황 관련 지표 |\n| **KDX 한국데이터거래소** | 국내 첫 민간 데이터 거래소, 유통/소비 빅데이터 |\n| **유통데이터 서비스 플랫폼** | 대한상공회의소 운영, 상품정보+거래정보 제공 |\n\n---\n\n## 6. 학습 체크리스트\n\n- [ ] DIKW 피라미드 4단계 설명 가능\n- [ ] MIS/DSS/EIS 차이점 정리 완료\n- [ ] BI 구성요소 흐름 (ETL → DW → OLAP → Dashboard) 암기\n- [ ] DW 4대 특성 암기\n- [ ] OLAP 5대 연산 정의·예시 숙지\n- [ ] ERP/CRM/SCM/KM 정의·특징 비교 완료\n- [ ] SWOT/5Forces/BCG/가치사슬 분석 프레임워크 정리\n- [ ] 재무제표 종류 및 주요 재무비율 산식 암기\n- [ ] 마케팅 STP/4P/PLC 개념 숙지\n- [ ] 빅데이터 3V/5V 및 데이터 마이닝 기법 정리\n- [ ] 클라우드(IaaS/PaaS/SaaS), IoT, AI 기초 개념 이해\n- [ ] 공공데이터 포털 6개 명칭·URL·제공 데이터 암기\n\n---\n\n> \"경영정보 일반\"은 경영학 전반의 기초 개념을 넓고 얕게 묻는 과목입니다. 깊은 이해보다는 **용어 정의의 정확한 구분**과 **프레임워크 구성요소 암기**에 집중하세요. 특히 ERP/CRM/SCM 비교, 재무비율 산식, SWOT 전략 매칭은 거의 매회 출제됩니다.\n\n---\n\n*Related: 경영정보시각화 MOC | 경영정보시각화 스터디플랜*",
  "# 필기 - 데이터 해석 및 활용\n\n> - 20문항 / 과목당 40점(8문항) 이상 + 전체 평균 60점 이상\n> - **핵심**: 통계 기초, 데이터 분석 기법, 데이터 품질, 인사이트 도출\n\n← 경영정보시각화 MOC | 경영정보시각화 스터디플랜\n\n---\n\n## 1. 데이터 유형\n\n| 유형 | 설명 | 예시 |\n|------|------|------|\n| **정형 데이터** (Structured) | 행/열 구조, RDBMS | 엑셀, DB 테이블 |\n| **반정형 데이터** (Semi-structured) | 스키마 유연, 태그 기반 | JSON, XML, HTML |\n| **비정형 데이터** (Unstructured) | 구조 없음 | 텍스트, 이미지, 영상 |\n\n### 데이터 척도 (Scale of Measurement)\n\n| 척도 | 특성 | 예시 | 가능한 연산 |\n|------|------|------|------------|\n| **명목** (Nominal) | 분류만 가능 | 성별, 혈액형 | 빈도, 최빈값 |\n| **서열** (Ordinal) | 순서 있음 | 학점(A>B>C), 만족도 | + 중앙값 |\n| **등간** (Interval) | 간격 동일, 절대영점 없음 | 온도(℃), 연도 | + 평균, 표준편차 |\n| **비율** (Ratio) | 절대영점 존재 | 키, 무게, 매출 | + 기하평균, 비율 |\n\n> 명목 → 서열 → 등간 → 비율 순으로 상위 척도가 하위 척도 연산 포함\n\n---\n\n## 2. 데이터 수집 방법\n\n| 방법 | 설명 |\n|------|------|\n| 설문조사 (Survey) | 구조화된 질문, 리커트 척도 |\n| 웹 크롤링 (Crawling) | 웹 데이터 자동 수집 |\n| API | 시스템 간 데이터 교환 (REST, SOAP) |\n| 로그 데이터 | 시스템 사용 기록 자동 수집 |\n| 공공데이터 | data.go.kr, KOSIS 등 |\n| IoT 센서 | 실시간 센서 데이터 |\n\n---\n\n## 3. 데이터 전처리\n\n### 결측치 (Missing Value) 처리\n\n| 방법 | 설명 |\n|------|------|\n| 삭제 (Deletion) | 결측치 포함 행/열 제거 |\n| 대체 (Imputation) | 평균, 중앙값, 최빈값으로 대체 |\n| 예측 모델 | 회귀, KNN 등으로 예측 대체 |\n\n### 이상치 (Outlier) 탐지\n\n| 방법 | 기준 |\n|------|------|\n| **IQR 방법** | $Q1 - 1.5 \\times IQR$ 미만 또는 $Q3 + 1.5 \\times IQR$ 초과 |\n| **Z-score** | $\\|z\\| > 3$ (표준편차 3배 초과) |\n| **시각적 탐지** | 박스플롯, 산점도 |\n\n### 데이터 변환\n\n- **정규화** (Normalization): $X_{norm} = \\frac{X - X_{min}}{X_{max} - X_{min}}$ → 0~1 범위\n- **표준화** (Standardization): $Z = \\frac{X - \\mu}{\\sigma}$ → 평균 0, 표준편차 1\n- **로그 변환**: 왜도가 큰 데이터에 적용\n- **원-핫 인코딩**: 범주형 → 이진 변환\n\n---\n\n## 4. 기술통계 (Descriptive Statistics)\n\n### 중심경향 측도\n\n| 측도 | 공식 | 특징 |\n|------|------|------|\n| **평균** (Mean) | $\\bar{x} = \\frac{\\sum x_i}{n}$ | 이상치에 민감 |\n| **중앙값** (Median) | 정렬 후 가운데 값 | 이상치에 강건 |\n| **최빈값** (Mode) | 가장 빈번한 값 | 명목척도 사용 가능 |\n| **절사평균** (Trimmed Mean) | 상하위 일정% 제거 후 평균 | 이상치 영향 감소 |\n\n> - 평균 vs 중앙값: 왜도가 큰 데이터는 중앙값이 더 적합\n> - 짝수 개수일 때 중앙값 = 가운데 두 값의 평균\n\n### 산포도 측도\n\n| 측도 | 공식 | 특징 |\n|------|------|------|\n| **범위** (Range) | $R = X_{max} - X_{min}$ | 이상치에 민감 |\n| **분산** (Variance) | $s^2 = \\frac{\\sum(x_i - \\bar{x})^2}{n-1}$ | 편차 제곱 평균 |\n| **표준편차** (SD) | $s = \\sqrt{s^2}$ | 분산의 제곱근 |\n| **변동계수** (CV) | $CV = \\frac{s}{\\bar{x}} \\times 100$ | 단위 다른 데이터 비교 |\n| **사분위범위** (IQR) | $IQR = Q3 - Q1$ | 이상치에 강건 |\n\n### 분포 형태\n\n| 측도 | 의미 |\n|------|------|\n| **왜도** (Skewness) | 0: 대칭 / 양수: 오른쪽 꼬리 / 음수: 왼쪽 꼬리 |\n| **첨도** (Kurtosis) | 0(정규): 기준 / 양수: 뾰족 / 음수: 평평 |\n\n> - 오른쪽 왜도(양): 평균 > 중앙값 > 최빈값\n> - 왼쪽 왜도(음): 평균 < 중앙값 < 최빈값\n\n---\n\n## 5. 확률과 확률분포\n\n### 주요 확률분포\n\n| 분포 | 유형 | 특징 |\n|------|------|------|\n| **이항분포** | 이산 | n번 시행, 성공확률 p |\n| **포아송분포** | 이산 | 단위시간/공간 내 발생 횟수 |\n| **정규분포** | 연속 | 종 모양, 평균·표준편차로 결정 |\n| **표준정규분포** | 연속 | $\\mu=0, \\sigma=1$ |\n\n> - $\\mu \\pm 1\\sigma$: 약 68%\n> - $\\mu \\pm 2\\sigma$: 약 95%\n> - $\\mu \\pm 3\\sigma$: 약 99.7%\n\n---\n\n## 6. 상관분석과 회귀분석\n\n### 상관분석 (Correlation)\n\n- **피어슨 상관계수**: $r = \\frac{\\sum(x_i-\\bar{x})(y_i-\\bar{y})}{\\sqrt{\\sum(x_i-\\bar{x})^2 \\sum(y_i-\\bar{y})^2}}$\n- 범위: $-1 \\leq r \\leq 1$\n- $|r| > 0.7$: 강한 상관 / $0.4 \\sim 0.7$: 보통 / $< 0.4$: 약한 상관\n\n> 상관관계가 있다고 인과관계가 있는 것은 아님 (시험 빈출!)\n\n### 회귀분석 (Regression)\n\n| 유형 | 수식 | 용도 |\n|------|------|------|\n| **단순선형** | $y = \\beta_0 + \\beta_1 x$ | 독립변수 1개 |\n| **다중선형** | $y = \\beta_0 + \\beta_1 x_1 + \\cdots + \\beta_k x_k$ | 독립변수 여러 개 |\n| **로지스틱** | $P(y=1) = \\frac{1}{1+e^{-z}}$ | 이진 분류 |\n\n- **결정계수** ($R^2$): 모델 설명력, 0~1 (1에 가까울수록 좋음)\n- **잔차** (Residual): 실제값 - 예측값\n\n---\n\n## 7. 가설검정\n\n### 기본 용어\n\n| 용어 | 설명 |\n|------|------|\n| **귀무가설** ($H_0$) | 차이/효과 없다 (기각 대상) |\n| **대립가설** ($H_1$) | 차이/효과 있다 (입증 대상) |\n| **유의수준** ($\\alpha$) | 귀무가설 기각 기준 (보통 0.05) |\n| **p-value** | 귀무가설이 참일 때 현재 결과가 나올 확률 |\n| **검정통계량** | t, z, F, $\\chi^2$ 등 |\n\n> - $p < \\alpha$ → $H_0$ 기각 → 통계적으로 유의미\n> - $p \\geq \\alpha$ → $H_0$ 기각 실패\n\n### 오류 유형\n\n| | $H_0$ 참 | $H_0$ 거짓 |\n|---|---------|-----------|\n| $H_0$ 기각 | **1종 오류** ($\\alpha$) | 올바른 결정 (검정력) |\n| $H_0$ 채택 | 올바른 결정 | **2종 오류** ($\\beta$) |\n\n---\n\n## 8. 표본추출 (Sampling)\n\n| 방법 | 설명 |\n|------|------|\n| **단순무작위** | 모든 원소 동일 확률 |\n| **체계적(계통)** | k번째 간격으로 추출 |\n| **층화** | 모집단을 층으로 나눈 후 각 층에서 추출 |\n| **군집** | 모집단을 군집으로 나눈 후 일부 군집 전체 조사 |\n| **편의** | 접근 쉬운 대상 (비확률) |\n\n---\n\n## 9. 데이터 분석 기법\n\n| 기법 | 목적 | 예시 |\n|------|------|------|\n| **분류** (Classification) | 범주 예측 | 의사결정나무, SVM, KNN |\n| **군집** (Clustering) | 유사 그룹 묶기 | K-means, DBSCAN |\n| **연관규칙** (Association) | 동시 발생 패턴 | 장바구니 분석, Apriori |\n| **시계열** (Time Series) | 시간 흐름 패턴 | 이동평균, ARIMA |\n| **텍스트 마이닝** | 텍스트 분석 | 감성분석, 워드클라우드 |\n\n### 연관규칙 주요 지표\n\n- **지지도** (Support): $P(A \\cap B)$\n- **신뢰도** (Confidence): $P(B|A) = \\frac{P(A \\cap B)}{P(A)}$\n- **향상도** (Lift): $\\frac{P(B|A)}{P(B)}$ → 1보다 크면 양의 연관\n\n---\n\n## 10. 데이터 품질\n\n### 데이터 품질 6대 요소\n\n| 요소 | 설명 |\n|------|------|\n| **완전성** (Completeness) | 결측 없이 데이터가 충분한가 |\n| **유일성** (Uniqueness) | 중복 없는가 |\n| **유효성** (Validity) | 정의된 형식/규칙에 맞는가 |\n| **정확성** (Accuracy) | 실제 값과 일치하는가 |\n| **일관성** (Consistency) | 여러 출처 간 모순 없는가 |\n| **적시성** (Timeliness) | 필요한 시점에 사용 가능한가 |\n\n---\n\n## 11. 인사이트 도출 및 스토리텔링\n\n### 분석 프로세스\n\n\n\n### 데이터 스토리텔링 3요소\n\n1. **데이터** — 분석 결과의 근거\n2. **내러티브** — 맥락과 해석\n3. **시각화** — 직관적 전달\n\n---\n\n## 빈출 키워드 정리\n\n| 키워드 | 빈출도 | 핵심 포인트 |\n|--------|--------|------------|\n| 척도 4종류 | ★★★ | 명목-서열-등간-비율 구분 |\n| 평균 vs 중앙값 | ★★★ | 왜도에 따른 적절한 선택 |\n| 상관계수 해석 | ★★★ | 상관 ≠ 인과 |\n| 정규분포 경험법칙 | ★★★ | 68-95-99.7 |\n| 1종/2종 오류 | ★★★ | α, β 구분 |\n| IQR 이상치 | ★★☆ | Q1-1.5IQR, Q3+1.5IQR |\n| 표본추출 방법 | ★★☆ | 층화 vs 군집 구분 |\n| 연관규칙 지표 | ★★☆ | 지지도, 신뢰도, 향상도 |\n| 결정계수 $R^2$ | ★★☆ | 회귀 모델 설명력 |\n| 데이터 품질 6요소 | ★★☆ | 완전·유일·유효·정확·일관·적시 |\n\n---\n\n## 12. 데이터베이스 이론 (보강)\n\n### 파일시스템 vs DBMS\n\n| 구분 | 파일시스템 | DBMS |\n|------|----------|------|\n| 데이터 중복 | 많음 | 최소화 |\n| 데이터 일관성 | 유지 어려움 | 유지 가능 |\n| 동시성 제어 | 부족 | 지원 (트랜잭션) |\n| 데이터 검색 | 비효율적 | 효율적 (SQL) |\n| 데이터 독립성 | 낮음 | 높음 |\n\n- DBMS 등장 배경: 파일시스템의 중복성, 검색 제한, 동시 접근 문제 해결\n- DB 장점: 중복 최소화, 일관성, 공유 가능 (종속성 **최소화**가 장점)\n\n### DB 구성요소\n\n| 구성요소 | 설명 |\n|---------|------|\n| **테이블(릴레이션)** | 행과 열로 구성된 데이터 저장 기본 단위 |\n| **레코드(튜플)** | 테이블의 행 (한 건의 데이터) |\n| **속성(Attribute)** | 테이블의 열 (이름, 나이 등) |\n| **도메인** | 속성이 가질 수 있는 값의 범위 |\n| **메타데이터** | 데이터에 대한 데이터 (특성, 구조, 의미 설명) |\n\n### 스키마 3단계 구조\n\n| 스키마 | 설명 |\n|--------|------|\n| **외부 스키마** | 사용자가 인식하는 논리적 구조 (뷰) |\n| **개념 스키마** | DB 전체의 논리적 구조 정의 |\n| **내부 스키마** | 물리적 저장 구조 (디스크, 인덱스) |\n\n- \"내용 스키마\"는 존재하지 않음 (시험 함정)\n\n### Key (키) 종류\n\n| 키 | 설명 | 유일성 | 최소성 |\n|-----|------|--------|--------|\n| **슈퍼키** | 레코드를 고유 식별할 수 있는 속성 집합 | O | X |\n| **후보키** | 슈퍼키 중 최소 속성으로 구성된 키 | O | O |\n| **기본키(PK)** | 후보키 중 선택된 대표 키 (NULL 불가) | O | O |\n| **대체키** | 후보키 중 기본키가 아닌 키 | O | O |\n| **외래키(FK)** | 다른 테이블의 기본키를 참조하는 키 | - | - |\n| **복합키** | 2개 이상 속성을 결합한 키 | O | O |\n\n### SQL 언어 분류\n\n| 분류 | 명령어 | 용도 |\n|------|--------|------|\n| **DDL** (데이터 정의어) | CREATE, ALTER, DROP | DB 구조 생성/수정/삭제 |\n| **DML** (데이터 조작어) | SELECT, INSERT, UPDATE, DELETE | 데이터 조회/삽입/수정/삭제 |\n| **DCL** (데이터 제어어) | GRANT, REVOKE | 권한 부여/회수 |\n\n- **INNER JOIN**: 두 테이블의 데이터를 병합하는 명령어\n\n### 관계형 DBMS vs NoSQL\n\n| 구분 | 관계형 DBMS | NoSQL |\n|------|-----------|-------|\n| 스키마 | 고정 (미리 정의) | 유연 (동적) |\n| 언어 | SQL | 다양 |\n| 데이터 유형 | 정형 | 비정형/반정형 |\n| 확장성 | 수직 확장 | 수평 확장 |\n| 예시 | Oracle, MySQL, SQL Server | MongoDB, Redis, Cassandra |\n\n### 분산 데이터베이스 (DDBMS)\n\n- **장점**: 성능 향상, 신뢰성/가용성 향상, 분산 제어, 확장성, 데이터 공유\n- **단점**: 소프트웨어 개발 비용 **증가**, 설계 **어려움**\n- **데이터 독립성**: 응용 프로그램에 영향 없이 논리적/물리적 구조 변경 가능\n\n#### DDBMS 투명성\n\n| 투명성 | 설명 |\n|--------|------|\n| **지역 사상 투명성** | 물리적 위치 무관하게 데이터 접근 |\n| **분할 투명성** | 데이터 분할 방식을 알 필요 없음 |\n| **중복 투명성** | 데이터 복제 여부를 알 필요 없음 |\n| **장애 투명성** | 장애 발생 시에도 정상 작동 |\n\n### ACID 원칙 (트랜잭션)\n\n| 원칙 | 설명 |\n|------|------|\n| **원자성(Atomicity)** | 전부 실행 또는 전부 취소 |\n| **일관성(Consistency)** | 트랜잭션 전후 DB 일관성 유지 |\n| **격리성(Isolation)** | 동시 실행 트랜잭션 간 간섭 없음 |\n| **지속성(Durability)** | 완료된 결과는 영구 저장 |\n\n---\n\n## 13. 데이터 보안 및 프라이버시 (보강)\n\n### 데이터 접근 제어\n\n- **역할 기반 접근 제어(RBAC)**: 역할에 따라 데이터 사용 권한 할당\n\n### 비식별화 기술\n\n| 기술 | 설명 |\n|------|------|\n| **익명화** | 개인 식별 정보 완전 제거 (복원 불가) |\n| **가명화** | 식별자를 대체 식별자로 대체 (복원 가능) |\n| **데이터 임의화** | 데이터에 임의의 변동(노이즈) 추가 |\n| **마스킹** | 실제 데이터 일부를 가려서 처리 |\n\n### 백업 방식\n\n| 방식 | 설명 | 백업 속도 | 복원 속도 |\n|------|------|----------|----------|\n| **전체 백업** | 모든 데이터 백업 | 느림 | 빠름 |\n| **증분 백업** | 마지막 백업 이후 변경분만 | 빠름 | 느림 |\n| **차등 백업** | 마지막 전체 백업 이후 변경분 | 중간 | 중간 |\n\n---\n\n## 14. 데이터 분석 심화 (보강)\n\n### 모델 적합도\n\n| 용어 | 설명 |\n|------|------|\n| **과대적합(Overfitting)** | 학습 데이터에 과도하게 맞춤 → 새 데이터 예측 실패 |\n| **과소적합(Underfitting)** | 모델이 너무 단순하거나 학습 부족 |\n| **교차 검증** | 데이터를 여러 폴드로 나눠 번갈아 훈련/검증 |\n| **홀드아웃** | 학습/검증 데이터를 고정 분리 |\n\n### 일반화 오류 유형\n\n- **확증 편향**: 기존 믿음을 확인하는 데이터만 선택\n- **표본 편향**: 비대표적 표본 사용\n- **생존자 편향**: 생존한 사례만 관찰\n\n### 확률분포 심화\n\n| 이산확률분포 | 연속확률분포 |\n|------------|------------|\n| 이항분포 | 정규분포 |\n| 포아송분포 | 균일분포(균등분포) |\n| | 지수분포 |\n| | **카이제곱 분포** |\n\n### 기타 보강 용어\n\n- **부울형(Boolean)**: 참/거짓, 예/아니오 두 가지 값만 가지는 데이터 유형\n- **웹 스크래핑**: 웹사이트에서 데이터를 자동 추출하는 과정\n- **스트리밍 데이터 처리**: 유입 데이터를 연속적·점진적 방식으로 처리\n- **셀프서비스 BI**: 비즈니스 사용자가 IT 없이 직접 데이터 탐색/분석\n- **BI 도구 예시**: 태블로(Tableau), Power BI, Qlik\n- **데이터 표준화**: 비교를 위해 데이터를 일관된 단위로 변환\n- **데이터 무결성**: 데이터의 정확성, 완전성, 일관성 보장\n- **조건부 확률**: 한 사건이 일어났다는 가정하에 다른 사건의 확률\n- **공분산**: 두 변수가 각자의 평균으로부터 함께 변하는 정도\n- **상관계수 해석**: |r|이 1에 가까울수록 강한 상관 (-1도 강한 음의 상관)\n- **NULL 처리**: 기술통계 계산 시 Null 값은 제외 후 연산\n\n---\n\n## 학습 체크리스트\n\n- [ ] 데이터 유형 및 척도 4종류 구분\n- [ ] 기술통계 공식 (평균, 분산, 표준편차, CV)\n- [ ] 정규분포 경험법칙 암기\n- [ ] 상관분석 vs 회귀분석 차이\n- [ ] 가설검정 절차 및 오류 유형\n- [ ] 표본추출 방법 비교\n- [ ] 데이터 품질 6대 요소\n- [ ] 도타비 모의고사 과목2 오답 정리",
  "# 필기 - 경영정보시각화 디자인\n\n> - 20문항 / 과목당 40점(8문항) 이상 + 전체 평균 60점 이상\n> - **핵심**: 시각화 유형, 색상 이론, 차트 설계, 대시보드, 인포그래픽\n\n← 경영정보시각화 MOC | 경영정보시각화 스터디플랜\n\n---\n\n## 1. 시각화 개요\n\n### 시각화의 목적\n\n- 복잡한 데이터를 직관적으로 전달\n- 패턴, 추세, 이상치를 빠르게 파악\n- 의사결정 지원\n\n### 시각적 인코딩 (Visual Encoding)\n\n데이터를 시각적 속성에 매핑하는 방법\n\n| 시각 변수 | 효과적인 데이터 유형 | 정확도 |\n|----------|-------------------|--------|\n| **위치** (Position) | 정량적 | ★★★ 가장 정확 |\n| **길이** (Length) | 정량적 | ★★★ |\n| **각도** (Angle) | 정량적 | ★★☆ |\n| **면적** (Area) | 정량적 | ★★☆ |\n| **색상 채도** (Saturation) | 정량적/순서형 | ★☆☆ |\n| **색상 색조** (Hue) | 범주형 | 분류용 |\n| **모양** (Shape) | 범주형 | 분류용 |\n\n> **위치 > 길이 > 각도 > 면적 > 색상** 순으로 정량적 비교 정확도가 높음 (Cleveland & McGill 연구)\n\n---\n\n## 2. 차트 유형별 사용 목적\n\n### 비교 (Comparison)\n\n| 차트 | 용도 | 적합한 데이터 |\n|------|------|-------------|\n| **막대 차트** (Bar) | 범주 간 값 비교 | 범주형 + 수량 |\n| **묶은 막대** (Grouped Bar) | 여러 시리즈 범주 비교 | 2개 이상 시리즈 |\n| **누적 막대** (Stacked Bar) | 전체 대비 부분 비교 | 구성비 포함 |\n| **방사형 차트** (Radar) | 다차원 항목 비교 | 평가 항목 5개 이상 |\n\n### 추세/시간 (Trend)\n\n| 차트 | 용도 | 적합한 데이터 |\n|------|------|-------------|\n| **꺾은선 차트** (Line) | 시간 흐름에 따른 변화 | 시계열 |\n| **영역 차트** (Area) | 시간별 크기 변화 + 누적 | 시계열 + 볼륨 |\n| **스파크라인** (Sparkline) | 미니 추세 표시 | 셀 내 작은 차트 |\n\n### 구성/비율 (Composition)\n\n| 차트 | 용도 | 적합한 데이터 |\n|------|------|-------------|\n| **원형 차트** (Pie) | 전체 대비 비율 | 항목 5개 이하 |\n| **도넛 차트** (Donut) | 원형 변형, 중앙 값 표시 | 항목 5개 이하 |\n| **트리맵** (Treemap) | 계층적 구성비 | 다수 항목 비율 |\n| **워터폴** (Waterfall) | 증감 분해 | 수익 구조 분석 |\n\n### 분포 (Distribution)\n\n| 차트 | 용도 | 적합한 데이터 |\n|------|------|-------------|\n| **히스토그램** (Histogram) | 연속 데이터 빈도 분포 | 연속형 |\n| **박스플롯** (Box Plot) | 분포 요약 (중앙값, IQR) | 연속형 비교 |\n| **산점도** (Scatter) | 두 변수 관계 | 상관관계 탐색 |\n| **버블 차트** (Bubble) | 3차원 관계 | 산점도 + 크기 |\n\n### 관계 (Relationship)\n\n| 차트 | 용도 |\n|------|------|\n| **산점도** | 2변수 상관관계 |\n| **히트맵** (Heatmap) | 매트릭스 형태 밀도/강도 |\n| **네트워크 그래프** | 노드 간 연결 관계 |\n| **산키 다이어그램** (Sankey) | 흐름/이동 시각화 |\n\n### 지리 (Geographic)\n\n| 차트 | 용도 |\n|------|------|\n| **단계구분도** (Choropleth) | 지역별 값 색상 표현 |\n| **버블맵** | 지도 위 크기로 값 표현 |\n| **히트맵 (지리)** | 밀도 분포 |\n\n> - **원형 차트**: 항목 5개 초과 시 비교 어려움 → 막대 차트 추천\n> - **3D 차트**: 왜곡 발생, 사용 지양\n> - **이중 축**: 오해 유발 가능, 스케일 주의\n\n---\n\n## 3. 색상 이론\n\n### 색상 모델\n\n| 모델 | 유형 | 구성 | 용도 |\n|------|------|------|------|\n| **RGB** | 가산혼합 (빛) | Red, Green, Blue (0~255) | 화면/디지털 |\n| **CMYK** | 감산혼합 (잉크) | Cyan, Magenta, Yellow, Key | 인쇄물 |\n| **HSL/HSV** | 직관적 표현 | Hue(색조), Saturation(채도), Lightness/Value(명도) | 디자인 조정 |\n| **HEX** | RGB 16진수 | #RRGGBB | 웹 |\n\n> - RGB: 빛의 3원색, 모두 합치면 **흰색** (가산)\n> - CMYK: 잉크의 3원색+검정, 모두 합치면 **검정** (감산)\n> - 화면용 = RGB, 인쇄용 = CMYK (시험 빈출!)\n\n### 색상 조화 (Color Harmony)\n\n| 조화 유형 | 설명 | 특징 |\n|----------|------|------|\n| **단색** (Monochromatic) | 한 색상의 명도/채도 변화 | 통일감, 순서형 데이터 |\n| **유사색** (Analogous) | 색상환 인접 색상 | 조화로움 |\n| **보색** (Complementary) | 색상환 반대편 | 강한 대비 |\n| **삼색** (Triadic) | 색상환 120° 간격 | 다양성 + 균형 |\n| **분리보색** (Split-complementary) | 보색 양옆 색상 | 대비 + 부드러움 |\n\n### 시각화 색상 팔레트 유형\n\n| 팔레트 | 용도 | 예시 |\n|--------|------|------|\n| **순차적** (Sequential) | 낮음→높음 연속값 | 밝은 파랑→짙은 파랑 |\n| **발산형** (Diverging) | 중앙 기준 양방향 | 빨강←흰색→파랑 |\n| **범주형** (Categorical) | 범주 구분 | 서로 다른 색상 |\n\n> - **색각이상** (색맹/색약) 고려: 빨강-초록 조합 피하기\n> - 색상만으로 구분하지 말고 패턴/레이블 병행\n> - 약 8%의 남성이 색각이상 (시험 출제!)\n\n---\n\n## 4. 디자인 원칙\n\n### 게슈탈트 법칙 (Gestalt Principles)\n\n| 법칙 | 설명 | 시각화 적용 |\n|------|------|-----------|\n| **근접성** (Proximity) | 가까운 요소를 그룹으로 인식 | 관련 차트 가까이 배치 |\n| **유사성** (Similarity) | 비슷한 요소를 그룹으로 인식 | 같은 색상/모양으로 범주 구분 |\n| **연속성** (Continuity) | 연속된 선/패턴 추적 | 꺾은선 차트 |\n| **폐합성** (Closure) | 불완전해도 완전한 형태로 인식 | 격자선 최소화 |\n| **전경/배경** (Figure/Ground) | 주요 요소와 배경 구분 | 핵심 데이터 강조 |\n\n### 데이터-잉크 비율 (Data-Ink Ratio)\n\n> \"데이터에 할당된 잉크의 비율을 최대화하라\"\n\n$$\\text{Data-Ink Ratio} = \\frac{\\text{Data Ink}}{\\text{Total Ink}}$$\n\n- 불필요한 장식(chartjunk) 제거\n- 격자선, 테두리, 3D 효과 최소화\n- **높을수록 좋은 시각화**\n\n### 시각화 거짓말 방지\n\n| 왜곡 유형 | 설명 |\n|----------|------|\n| **Y축 절단** | 0에서 시작하지 않아 차이 과장 |\n| **비율 왜곡** | 면적/부피로 1차원 값 표현 시 왜곡 |\n| **축 비율 조작** | 넓은 vs 좁은 축 범위 |\n| **3D 효과** | 원근감으로 크기 왜곡 |\n| **이중 축** | 스케일 차이로 상관관계 과장 |\n\n> Tufte의 **거짓말 지수** (Lie Factor):\n> $$\\text{Lie Factor} = \\frac{\\text{그래프 상 효과 크기}}{\\text{데이터 상 효과 크기}}$$\n> 1에 가까울수록 정직한 시각화\n\n---\n\n## 5. 대시보드 설계\n\n### 대시보드 유형\n\n| 유형 | 목적 | 대상 | 특징 |\n|------|------|------|------|\n| **전략적** (Strategic) | 장기 목표 모니터링 | 경영진 | KPI, 추세 |\n| **분석적** (Analytical) | 심층 분석 | 분석가 | 필터, 드릴다운 |\n| **운영적** (Operational) | 실시간 모니터링 | 현업 | 실시간, 알림 |\n\n### 대시보드 설계 원칙\n\n1. **5초 규칙**: 5초 내에 핵심 메시지 전달\n2. **Z패턴/F패턴**: 시선 흐름에 맞는 레이아웃\n3. **KPI 우선**: 가장 중요한 지표를 상단/좌측에 배치\n4. **일관성**: 색상, 폰트, 차트 스타일 통일\n5. **필터/상호작용**: 사용자가 탐색할 수 있는 인터랙션\n\n### 레이아웃 패턴\n\n```\n┌─────────────────────────────────┐\n│          KPI 카드 영역            │  ← 핵심 수치\n├───────────────┬─────────────────┤\n│   주요 차트    │   보조 차트      │  ← 상세 분석\n│               │                 │\n├───────────────┴─────────────────┤\n│          상세 테이블/필터          │  ← 세부 데이터\n└─────────────────────────────────┘\n```\n\n---\n\n## 6. 인포그래픽\n\n### 인포그래픽 유형\n\n| 유형 | 특징 | 용도 |\n|------|------|------|\n| **통계형** | 숫자/차트 중심 | 조사 결과 |\n| **타임라인** | 시간 순서 | 역사, 프로세스 |\n| **비교형** | 항목 대조 | 제품/서비스 비교 |\n| **프로세스형** | 단계 흐름 | 절차 설명 |\n| **지리형** | 지도 기반 | 지역 데이터 |\n| **계층형** | 피라미드/트리 | 조직, 분류 |\n\n### 타이포그래피 기초\n\n| 구분 | 설명 |\n|------|------|\n| **세리프** (Serif) | 획 끝에 장식 (Times) — 인쇄물, 본문 |\n| **산세리프** (Sans-serif) | 장식 없음 (Arial) — 화면, 제목 |\n| **가독성** | 본문은 10~12pt, 줄간격 1.5배 |\n| **위계** | 제목-부제-본문 크기/무게 차이로 구조 표현 |\n\n---\n\n## 빈출 키워드 정리\n\n| 키워드 | 빈출도 | 핵심 포인트 |\n|--------|--------|------------|\n| 차트 유형별 적합 데이터 | ★★★ | 비교/추세/구성/분포/관계 구분 |\n| RGB vs CMYK | ★★★ | 가산혼합(화면) vs 감산혼합(인쇄) |\n| 색상 팔레트 유형 | ★★★ | 순차/발산/범주 구분 |\n| Data-Ink Ratio | ★★★ | Tufte, 높을수록 좋음 |\n| 게슈탈트 법칙 | ★★★ | 근접성, 유사성, 연속성, 폐합성 |\n| 대시보드 3유형 | ★★☆ | 전략적/분석적/운영적 |\n| 색각이상 접근성 | ★★☆ | 빨강-초록 피하기, 남성 8% |\n| 시각 변수 정확도 순서 | ★★☆ | 위치 > 길이 > 각도 > 면적 > 색상 |\n| Y축 절단 왜곡 | ★★☆ | 0에서 시작 원칙 |\n| 인포그래픽 유형 | ★★☆ | 통계/타임라인/비교/프로세스 |\n\n---\n\n## 7. 추가 차트 유형 (보강)\n\n### 시간·비교 차트\n\n| 차트 | 용도 |\n|------|------|\n| **경사차트(Slope Chart)** | 정량 데이터의 시간 전후 변화 비교 |\n| **간트차트(Gantt Chart)** | 프로젝트 일정·작업 기간 시각화 (수평 막대) |\n| **막대사탕(롤리팝) 차트** | 막대 위에 원형 점, 간결한 비교 |\n| **덤벨 차트** | 두 시점/그룹 간 차이 표현 |\n| **범프 차트** | 순위 변화 추적 |\n| **Bullet Chart** | 목표 대비 실적 비교 (시간 변화가 아님!) |\n\n### 분포·불확실성 차트\n\n| 차트 | 용도 |\n|------|------|\n| **오차막대/수평오차막대** | 데이터의 **불확실성** 표현에 가장 적합 |\n| **신뢰대역** | 예측값의 신뢰구간 시각화 |\n| **분위수점도표** | 분위수별 데이터 분포 |\n| **바이올린 플롯** | 박스플롯 + 밀도 분포 결합 (분포 시각화) |\n| **스웜 플롯** | 개별 데이터 점을 겹치지 않게 표시 (분포 시각화) |\n| **QQ도표(분위수-분위수 차트)** | 이론적 분포 vs 실제 분포 비교 |\n\n### 흐름·관계 차트\n\n| 차트 | 용도 |\n|------|------|\n| **생키차트(Sankey)** | 여러 레벨 간 흐름/이동 시각화 |\n| **시나플롯** | 범주별 데이터 분포를 흐르는 형태로 |\n| **스트림차트** | 시간에 따른 범주별 볼륨 변화 |\n| **상관도표(Correlogram)** | 변수 간 상관관계 매트릭스 (상관 ≠ 인과!) |\n\n### 공간 차트\n\n| 차트 | 용도 |\n|------|------|\n| **단계구분도(Choropleth)** | 지역별 값을 색상 단계로 표현 |\n| **카토그램** | 데이터 값에 따라 지역 크기 왜곡 |\n| **카토그램 히트맵** | 육각형 등 규격화된 형태로 지역 데이터 표현 |\n| **밀도맵** | 데이터 밀집도를 색상 강도로 |\n| **캘린더 차트** | 요일(행) × 주차(열)로 날짜 데이터 시각화 (2D, 3D 아님!) |\n\n### 기타\n\n| 차트 | 용도 |\n|------|------|\n| **와플 차트** | 격자를 채워 비율 표현 |\n| **폭포수(워터폴) 차트** | 누적 효과, 증감 분해 (음수값도 표현 가능) |\n| **덴드로그램** | 계층적 클러스터링 트리 구조 시각화 |\n\n---\n\n## 8. 디자인 원리 심화 (보강)\n\n### 디자인 기본 원리\n\n| 원리 | 설명 |\n|------|------|\n| **균형** | 시각적 무게감의 균형 (대칭/비대칭) |\n| **비례** | 요소들 간 상대적 크기와 배치 조합 |\n| **리듬** | 두 개 이상 요소가 반복되어 일정 패턴 형성 |\n| **대비** | 상반된 요소를 배치하여 차이 강조 |\n| **조화** | 통일과 변화의 적절한 조합 |\n| **공간** | 요소의 크기, 위치, 간격이 형성하는 물리적 공간 |\n\n> 시험 주의: \"균형 = 통일과 변화를 적절하게 조합\" → 틀림 (이것은 '조화')\n\n### 인포그래픽 원칙\n\n- **오컴의 면도날**: 핵심 메시지 강조, 단순한 시각화, 명확한 구조화, 최소한의 텍스트\n- **에디토리얼 인포그래픽**: 전통적 시각화보다 삽화와 장식을 많이 포함\n\n### BI 도구 개념\n\n| 개념 | 설명 |\n|------|------|\n| **재현 가능성(Reproducibility)** | 동일 데이터·과정 → 동일 결과 |\n| **반복 가능성(Repeatability)** | 무작위 요소 포함 시 구현 어려울 수 있음 |\n| **Dimension(차원)** | 범주형 데이터 (지역, 제품명 등) |\n| **Measure(측정값)** | 양적/수치형 데이터 (매출, 수익 등) |\n\n- Power BI: 데이터 추출/변환(Power Query) 기능 **제공** + 클라우드(Power BI Service) **지원**\n- Power BI AVERAGE vs Tableau AVG (함수명 다름)\n\n### 엑셀 시각화 기능\n\n| 기능 | 설명 | 용도 |\n|------|------|------|\n| **스파크라인** | 셀 내 미니 차트 (꺾은선/막대/승패) | 데이터 추세 한눈에 파악 |\n| **데이터 막대** | 조건부 서식, 값의 상대적 크기를 막대로 | 값 비교 |\n| **아이콘 세트** | 조건부 서식, 화살표/신호등 등 아이콘 | 상태 표시 |\n\n> 주의: \"데이터 막대가 시간 변화 시각화에 좋다\" → 틀림 (값의 상대적 크기 비교용)\n\n---\n\n## 9. 시각화 이론가 (보강)\n\n| 이론가 | 주요 주장 |\n|--------|---------|\n| **에드워드 터프티** | Data-Ink Ratio 최대화, 불필요한 장식(chartjunk) 제거 |\n| **나이젤 홈즈** | 일러스트레이션과 장식이 시각화에 중요 (터프티와 대립) |\n| **클라우스 윌케** | 시각적 속성 주요 변수 정의 |\n| **콜린웨어** | 뇌의 시각정보 처리 순서 연구 |\n| **한스 로슬링** | 갭마인더(Gapminder) — 버블 차트로 글로벌 데이터 시각화 |\n| **Cleveland & McGill** | 시각 변수 정확도 순서: 위치 > 길이 > 각도 > 면적 > 색상 |\n\n---\n\n## 학습 체크리스트\n\n- [ ] 차트 유형별 적합한 데이터 유형 구분\n- [ ] RGB vs CMYK 차이 (가산 vs 감산)\n- [ ] 색상 팔레트 3종류 구분\n- [ ] 게슈탈트 법칙 5가지 암기\n- [ ] Data-Ink Ratio 개념 및 적용\n- [ ] 대시보드 유형 3가지 구분\n- [ ] 시각화 왜곡/거짓말 유형 파악\n- [ ] 도타비 모의고사 과목3 오답 정리"
];

let currentTab = 0;

function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });
  renderContent();
}

function renderContent() {
  const md = SUBJECTS[currentTab];
  document.getElementById('content').innerHTML = marked.parse(md);
  window.scrollTo({ top: 0 });
}

// Initial render
renderContent();
</script>
